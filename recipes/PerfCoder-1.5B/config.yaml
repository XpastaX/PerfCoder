# Model arguments
model_name_or_path: /home/j84389114/project/CodeOpt/ckpt/CoS/PerfCoder-QC1.5B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: DATA_HQ_SELECTED_5K
dataset_type: PIE
dataset_train_split: train
dataset_test_split: val
dataset_config: default
dataset_prompt_column: prompt
no_cache: True

# GRPO trainer config
bf16: true
use_vllm: true
do_eval: true
eval_strategy: steps
eval_steps: 100
gradient_accumulation_steps: 8
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: PerfCoder-1.5B
hub_strategy: every_save
learning_rate: 3.0e-06
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 5
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 4096
max_completion_length: 4096
max_steps: -1
num_generations: 4
num_train_epochs: 1
output_dir: data/PerfCoder-1.5B-GRPO
overwrite_output_dir: true

per_device_eval_batch_size: 4
per_device_train_batch_size: 4
# push_to_hub: true
# report_to:
# - wandb
reward_funcs:
- cos_optimizer_code
reward_weights:
- 1.0

save_strategy: "epoch"
save_total_limit: 1

seed: 42
warmup_ratio: 0.1
temperature: 0.7
top_p: 1.0
stop_words: ["[/SUGG]"]
stop: ["[/SUGG]"]
stop_reason: "[/SUGG]"
repetition_penalty: 1.1
vllm_mode: "server"
vllm_server_host: 127.0.0.1
vllm_server_port: 8000
cos_optimizer_prompt_template_file: prompts/base_optimizer.txt
cos_optimizers:
  - host: 127.0.0.1
    port: 8001
    model_name: /home/j84389114/LLM_ZOO/qwen2.5-32b-Inst